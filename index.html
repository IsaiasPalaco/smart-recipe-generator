<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Recipe Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <h1>🍳 Smart Recipe Generator</h1>
    <p>Cook smarter with what you already have</p>
  </header>

  <main class="container">
    <section class="search-box">
      <h2>What ingredients do you have?</h2>
      <input type="text" id="ingredients" placeholder="e.g. chicken, rice, tomato" />

      <div class="filters">
        <select id="dietFilter">
          <option value="">All Diets</option>
          <option value="vegetarian">Vegetarian</option>
          <option value="vegan">Vegan</option>
          <option value="gluten-free">Gluten Free</option>
          <option value="ketogenic">Ketogenic</option>
          <option value="paleo">Paleo</option>
        </select>
        
        <select id="maxTime">
          <option value="120">Ready in (Any time)</option>
          <option value="15">Max 15 min</option>
          <option value="30">Max 30 min</option>
          <option value="45">Max 45 min</option>
          <option value="60">Max 1 hour</option>
        </select>
      </div>

      <button id="searchBtn">Find Recipes</button>
      
      <div style="margin-top: 20px;">
        <a href="favorites.html" class="fav-link">⭐ View My Favorites</a>
      </div>

      <div id="searchHistory" class="history-tags"></div>
    </section>
  </main>

  <footer class="footer">
    <p>© 2026 Smart Recipe Generator | Built by Isaias Palaço</p>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
